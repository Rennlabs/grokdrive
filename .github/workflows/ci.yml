name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check (bash + node)
        run: |
          bash -n bin/grokdrive install.sh
          node --check hooks/grokdrive-gate.js

      - name: ShellCheck (severity=error)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --severity=error bin/grokdrive install.sh
